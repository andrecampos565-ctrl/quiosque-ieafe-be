<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Pagamento IEAFE BE</title>

<style>

body {
font-family: Arial;
text-align:center;
padding:50px;
}

button {

padding:25px;
font-size:25px;
border-radius:15px;

}

</style>

</head>

<body>

<h1>💳 Pagamento IEAFE BE</h1>

<h2 id="valor">
Aguardando confirmação
</h2>


<p>
Aproxime seu cartão no terminal
</p>


<button onclick="confirmar()">
Confirmar pagamento
</button>


<script>

function confirmar(){

const pagamento = {

referencia: "IEAFE-" + Date.now(),

tipo: "Oferta",

valor: 0

};


fetch("http://localhost:3000/pagamento-confirmado", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(pagamento)

})


.then(res=>res.json())

.then(resultado=>{

alert(resultado.mensagem);

window.location.href="index.html";

});

}

</script>


</body>

</html>
