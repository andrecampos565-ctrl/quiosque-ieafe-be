<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo IEAFE BE</title>
<h2>Centro de Gestão</h2>

<button onclick="window.location.href='financeiro.html'">
💰 Financeiro
</button>

<br><br>

<button onclick="window.location.href='visitante.html'">
👥 Visitantes
</button>

<br><br>

<button onclick="window.location.href='oracao.html'">
🙏 Pedidos de Oração
</button>

<br><br>

<button onclick="window.location.href='eventos.html'">
📅 Eventos
</button>
</head>
<h2>📋 Visitantes cadastrados</h2>

<div id="lista"></div>


<script>

fetch("http://localhost:3000/visitantes")

.then(res => res.json())

.then(dados => {

    let html = "";

    dados.forEach(visitante => {

        html += `
        <div style="
        border:1px solid #ccc;
        padding:15px;
        margin:10px;
        border-radius:10px;
        ">

        <h3>${visitante.nome}</h3>

        <p>📞 ${visitante.telefone}</p>

        <p>📧 ${visitante.email}</p>

        </div>
        `;

    });


    document.getElementById("lista").innerHTML = html;

});

</script>
<body>

<h1>Painel Administrativo IEAFE BE</h1>

<h2>Controle do Quiosque</h2>

<ul>
    <li>Visitantes cadastrados</li>
    <li>Pedidos de oração</li>
    <li>Inscrições em eventos</li>
    <li>Contatos pastorais</li>
</ul>

</body>
</html>
