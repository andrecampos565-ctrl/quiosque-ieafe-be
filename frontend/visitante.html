<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Cadastro de Visitante - IEAFE BE</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 40px;
}

input {
    width: 80%;
    padding: 15px;
    margin: 10px;
    font-size: 18px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
}
</style>

</head>

<body>

<h1>📝 Cadastro de Visitante</h1>

<p>
Seja bem-vindo à IEAFE BE!
</p>

<input id="nome" placeholder="Seu nome">

<br>

<input id="telefone" placeholder="Seu telefone">

<br>

<input id="email" placeholder="Seu e-mail">

<br>

<button onclick="enviarCadastro()">
Enviar cadastro
</button>

<script>

function enviarCadastro(){

const dados = {
    nome: document.getElementById("nome").value,
    telefone: document.getElementById("telefone").value,
    email: document.getElementById("email").value
};

fetch("http://localhost:3000/visitante", {

    method: "POST",

    headers: {
        "Content-Type": "application/json"
    },

    body: JSON.stringify(dados)

})

.then(res => res.json())

.then(resultado => {

    alert(resultado.mensagem);

});

}

</script>

</body>

</html>
